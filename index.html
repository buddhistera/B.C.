    <style>

    :root { 
        --gold: #d4af37; 
        --bg: #fffff0; 
        --text: #3e2723; 
        --blue: #003399; 
        --dark-red: #8B0000;
        --orange: #FF6600;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        width: 100%;
        
        overscroll-behavior-y: none !important;
        touch-action: pan-x pan-y !important;
    }

    body { 
        font-family: 'Segoe UI', 'Nirmala UI', -apple-system, sans-serif; 
        display: flex; 
        justify-content: center; 
        align-items: flex-start;
        min-height: 100vh;
        background-color: #e0e0e0;
        -webkit-font-smoothing: antialiased;
    }

    
    .app-container { 
        background: white; 
        width: 100%; 
        max-width: 420px; 
        min-height: auto;
        margin: 10px;
        border-radius: 24px; 
        display: flex; 
        flex-direction: column; 
        box-shadow: 0 10px 40px rgba(0,0,0,0.15); 
        position: relative; 
        overflow: hidden;
        
    background-image: linear-gradient(rgba(255,255,255,0.95), rgba(255,255,255,0.95)), 
                      url('https://upload.wikimedia.org/wikipedia/commons/d/df/Buddhist_flag.svg');
}

/* main content layout */
.main-content {
    padding: 15px;
}


.date-picker-section {
    text-align: center;
    margin-bottom: 15px;
}
 
.pali-box {
    margin: 0 0 15px 0;
}


.poya-status {
    font-size: 1.2em;
    font-weight: bold;
}

.by-display-grid {
    display: grid;
    grid-template-columns: 1fr 1fr; 
    gap: 15px;
    margin-bottom: 20px;
}


.by-card {
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

/* by-card header */
.by-card-header {
    color: white;
    padding: 10px;
    text-align: center;
    font-weight: bold;
    font-size: 0.9em;
}

/* by-card body */
.by-card-body {
    padding: 15px;
    text-align: center;
}

/* color schemes */
.bg-atikkanta {
    border: 1px solid var(--orange);
}
.bg-atikkanta .by-card-header {
    background: linear-gradient(to right, var(--orange), #000000);
}

.bg-avasittha {
    border: 1px solid var(--blue);
}
.bg-avasittha .by-card-header {
    background: linear-gradient(to right, var(--blue), #000000);
}


.year-val {
    font-size: 1.4em;
    font-weight: bold;
    color: var(--text);
    margin-bottom: 5px;
}
.yr-si {
    font-size: 0.8em;
    font-weight: bold;
    color: #888;
}
.other-vals {
    font-size: 1.1em;
    color: #666;
    font-weight: 500;
}
.by-card-header {
    min-height: 1.5em; 
    font-weight: bold;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.2);
    padding-bottom: 5px;
    margin-bottom: 8px;
}

    /* 3. Header සහ Menu Dots */
    .header { 
        background: linear-gradient(45deg, var(--blue), var(--dark-red), var(--orange), var(--gold));
        color: white; 
        padding: 18px; 
        text-align: center; 
        font-size: 1.3em; 
        font-weight: bold; 
        text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
        position: relative; 
        z-index: 100;
    }

    .menu-dots { 
        position: absolute; 
        right: 15px; 
        top: 50%;
        transform: translateY(-50%);
        cursor: pointer; 
        font-size: 28px; 
        color: white;
        transition: 0.3s;
        z-index: 101;
        padding: 5px;
    }
    
    .menu-dots:hover { opacity: 0.8; transform: translateY(-50%) scale(1.1); }

    /* 4. Menu Dropdown */
    .menu-dropdown { 
        display: none; 
        position: absolute; 
        right: 10px; 
        top: 55px; 
        background: rgba(255, 255, 255, 0.98); 
        border-radius: 12px; 
        box-shadow: 0 8px 25px rgba(0,0,0,0.3); 
        min-width: 200px; 
        z-index: 1000; 
        overflow: hidden; 
        border: 2px solid var(--gold);
        animation: menuFade 0.2s ease-out;
    }
    
    @keyframes menuFade {
        from { opacity: 0; transform: translateY(-10px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .menu-dropdown div { 
        padding: 14px 20px; 
        color: var(--text); 
        cursor: pointer; 
        border-bottom: 1px solid #eee; 
        font-size: 1em; 
        font-weight: 500;
        display: flex;
        align-items: center;
        transition: 0.2s;
    }
    .menu-dropdown div:hover { background: #fff9c4; color: var(--dark-red); padding-left: 25px; }

    /* 5. Main Content සහ Sections */
    .main-content { flex: 1; overflow-y: auto; padding-bottom: 20px; }
    .section { padding: 15px; border-bottom: 1px solid #eee; }
    .label { font-size: 0.8em; color: #777; display: block; margin-bottom: 5px; }
    .value { font-size: 1.5em; font-weight: bold; color: var(--text); }
    
    .pali-box { 
        background: #fffde7; 
        border: 1px solid #ffe082; 
        padding: 20px; 
        text-align: center; 
        font-size: 1.1em; 
        line-height: 1.8; 
        white-space: pre-wrap; 
        color: #5d4037; 
        font-weight: 500; 
        border-radius: 10px; 
        margin: 0 10px; 
    }
    
    .footer-table { width: 100%; font-size: 0.95em; text-align: center; border-collapse: separate; border-spacing: 0 5px; }
    .footer-table td { padding: 10px; border-radius: 5px; }
    .bg-orange { background: #fbe9e7; }
    .bg-light { background: #f3e5f5; }

.vas-card {
    background: #ffffff;
    border-left: 5px solid var(--dark-red);
    margin: 12px 0;
    padding: 12px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    display: flex;
    flex-direction: column;
}

.vas-label {
    font-size: 0.85em;
    color: #666;
    font-weight: bold;
    margin-bottom: 4px;
}

.vas-date-badge {
    display: inline-block;
    background: var(--dark-red);
    color: white;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 1em;
    font-weight: bold;
    width: fit-content;
}

    /* 6. Date Row සහ Controls */
    .date-row {
        display: flex;
        gap: 10px;
        align-items: center;
        justify-content: center;
        width: 100%;
        padding: 0 15px;
    }

    input[type="date"] { 
        flex: 1; 
        padding: 12px; 
        border: 2px solid var(--gold); 
        border-radius: 8px; 
        font-size: 1em; 
        outline: none;
    }

    .reset-btn { 
        padding: 10px 15px; 
        background: white; 
        border: 2px solid var(--gold); 
        border-radius: 8px; 
        cursor: pointer; 
        font-size: 1.2em; 
    }
    .reset-btn:hover { background: #fff9c4; }

   
.modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; max-width: 400px; max-height: 85vh; border-radius: 15px; overflow-y: auto; padding: 20px; position: relative; }
        .modal-header { font-weight: bold; font-size: 1.1em; border-bottom: 2px solid var(--gold); padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .close-btn { cursor: pointer; font-size: 24px; color: #777; }
        .edit-btn { background: var(--blue); border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.85em; color: white; }
.season-banner {
    grid-column: span 2;
    background: #f1f1f1;
    color: #333;
    font-weight: bold;
    font-size: 0.8em;
    padding: 4px 10px;
    margin-top: 5px;
    border-left: 4px solid var(--gold);
    border-radius: 3px;
}

.poya-item-compact {
    border: 1px solid #eee;
    border-radius: 6px;
    padding: 5px 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: white;
}

.poya-item-compact.is-today {
    background: #fff9c4;
    border-color: var(--gold);
}

.poya-info { line-height: 1.2; }
.poya-date { font-weight: bold; font-size: 0.9em; display: block; }
.poya-name { font-size: 0.7em; color: #666; }

.poya-tag {
    font-size: 0.65em;
    padding: 2px 5px;
    border-radius: 4px;
    color: white;
    font-weight: bold;
    min-width: 25px;
    text-align: center;
}
.exit-button-fixed {
    position: absolute;
    top: 5px;
    right: 5px;
    background: #e74c3c;
    color: white;
    border: none;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-weight: bold;
    font-size: 18px;
    cursor: pointer;
    z-index: 3000;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}
.exit-btn:hover {
    background: #c0392b;
}


.modal-header {
    border-bottom: 2px solid var(--gold);
    margin-bottom: 10px;
    padding-bottom: 5px;
}

    .close-btn { cursor: pointer; font-size: 24px; color: #777; }

    
    .badge-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
    .badge { 
        display: flex; 
        align-items: center; 
        padding: 8px 10px; 
        border-radius: 8px; 
        text-decoration: none; 
        color: white; 
        font-size: 11px; 
        font-weight: bold; 
        transition: 0.2s; 
        box-shadow: 0 2px 5px rgba(0,0,0,0.2); 
    }
    .badge:hover { transform: translateY(-2px); }
    .badge svg, .badge img { width: 18px; height: 18px; margin-right: 8px; }
    
    .bg-win { background: #0078d4; } 
    .bg-mac { background: #000000; } 
    .bg-lin { background: #333333; } 
    .bg-and { background: #3DDC84; color: #073042; }

@media (prefers-color-scheme: dark) {
    :root {
        --bg-black: #0c0c0c;          
        --card-dark: #121212;         
        --inner-box: #1d1d1d;         
        --pali-box: #1a1a0d;

        --text-white: #ffffff;

    body {

    .app-container {

    .header-section {

    .stat-item {

    .atikkantha-card {

    }

    .avasiittha-card {
        background: linear-gradient(180deg, #0a3d91 0%, #000000 40%) !important;

    }

    input[type="date"], select, .input-field {
        background-color: #262626 !important;
        color: white !important;
        border: 1px solid #444 !important;
    }

    .poya-info {
        color: #4caf50 !important;
    }
}



</style>
